apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-backend
  labels:
    app: sample-backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sample-backend
  template:
    metadata:
      labels:
        app: sample-backend
        tier: backend
    spec:
      containers:
        - name: http-server
          image: hashicorp/http-echo:0.2.3
          args:
            - "-text=hello from kubernetes"
          ports:
            - containerPort: 5678
          env:
            - name: ENVIRONMENT
              value: "dev"
            - name: LOG_LEVEL
              value: "debug"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 10
            periodSeconds: 20
